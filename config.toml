baseURL = 'https://2026.inercia.pt/'
languageCode = 'pt-PT'
title = 'Inércia 2026'
theme = 'inercia'

defaultContentLanguage = 'pt'
defaultContentLanguageInSubdir = true

[params]
  description = "Inércia 2026 - Digital Arts Festival in Portugal"
  social_image = "/images/inercia2026_promo.png"
  twitter = "inercia_pt"
  favicon = "/images/ID_64px.png"
  logo = "/images/svg/iD_grey_flat.svg"
  logo_small = "/images/svg/iD_grey_flat.svg"

  # Place Youtube partial like here (stuff after ?v=)
  youlinktube = "dQw4w9WgXcQ"
  scenelinksat = "video/5"

  # Change to show Partyman button on navbar
  acceptingsubmissions = true

  # Change this mofo to true Saturday morning
  wearelive = false

  # PostParty button thing
  postparty = false

